# ─── Nginx como Load Balancer + Reverse Proxy ──────────────────────────────────
#
# Nginx cumple varios roles en esta arquitectura:
#
#   1. REVERSE PROXY: recibe requests del cliente y las delega a la API.
#      El cliente solo conoce el puerto 80. No sabe cuántas instancias hay atrás.
#
#   2. LOAD BALANCER: distribuye las requests entre múltiples instancias de la API.
#      Estrategias disponibles: round-robin (default), least_conn, ip_hash.
#
#   3. HEALTH CHECKS: verifica que cada instancia está sana antes de enviarle tráfico.
#      Si una instancia falla el health check → se saca del pool automáticamente.
#      Cuando se recupera → vuelve al pool.
#
#   4. RATE LIMITING: primera línea de defensa contra sobrecarga/DDoS.
#      (Complementa el rate limiting de la aplicación)
#
#   5. CABECERAS DE SEGURIDAD: X-Frame-Options, HSTS, etc.
#
# Para activar el upstream_check module (health checks activos) en producción
# necesitarías nginx-plus o el módulo nginx_upstream_check_module.
# En este demo usamos passive health checks (built-in).

events {
    # Número máximo de conexiones simultáneas por worker.
    # worker_processes * worker_connections = conexiones totales.
    worker_connections 1024;
}

http {

    # ─── Logging ──────────────────────────────────────────────────────────────
    # Formato personalizado con campos extra para observabilidad.
    # En producción estos logs se enviarían a Loki o ELK Stack.
    log_format json_combined escape=json
        '{'
            '"timestamp":"$time_iso8601",'
            '"method":"$request_method",'
            '"path":"$uri",'
            '"status":$status,'
            '"response_time_ms":$request_time,'  # Tiempo total (incluye upstream)
            '"upstream_time_ms":"$upstream_response_time",'
            '"upstream_addr":"$upstream_addr",'  # IP de la instancia que respondió
            '"bytes_sent":$bytes_sent,'
            '"client_ip":"$remote_addr",'
            '"user_agent":"$http_user_agent",'
            '"request_id":"$http_x_request_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;


    # ─── Rate Limiting ─────────────────────────────────────────────────────────
    # Primera línea de defensa. Limita requests por IP antes de llegar a la app.
    # 10m = zona de memoria de 10MB (~160,000 IPs).
    # rate=10r/s = máximo 10 requests por segundo por IP.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;


    # ─── Upstream: Pool de instancias de la API ────────────────────────────────
    # "api1" y "api2" son los nombres de los servicios en docker-compose.yml.
    # Docker resuelve estos nombres a las IPs de los contenedores.
    upstream api_pool {
        # Estrategia de balanceo: round-robin (default) — cada request va a la
        # siguiente instancia en orden cíclico.
        #
        # Alternativas:
        #   least_conn;  → va al servidor con menos conexiones activas
        #   ip_hash;     → misma IP → mismo servidor (sesiones pegajosas)

        server api1:8000 max_fails=3 fail_timeout=10s;
        server api2:8000 max_fails=3 fail_timeout=10s;

        # max_fails=3:     después de 3 fallos → marcar como "down"
        # fail_timeout=10s: tiempo en el que se cuentan los fallos, y tiempo
        #                   que permanece "down" antes de volver a intentarlo.

        # keepalive: mantener conexiones persistentes al upstream.
        # Evita el overhead de TCP handshake en cada request.
        keepalive 32;
    }


    # ─── Virtual Host: maneja el tráfico entrante ──────────────────────────────
    server {
        listen 80;
        server_name _;   # Acepta cualquier hostname (demo). En prod: tu dominio.

        # Timeouts — ajustar según la latencia de tu backend.
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Cabeceras que Nginx añade al request antes de enviarlo al upstream.
        # La app lee X-Forwarded-For para obtener la IP real del cliente.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";   # Necesario para keepalive al upstream


        # ─── Cabeceras de Seguridad ──────────────────────────────────────────
        # En producción: agregar HSTS, CSP, etc.
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;


        # ─── Health Check interno de Nginx ───────────────────────────────────
        # Nginx verifica /ready en cada instancia antes de enviarle tráfico.
        # Si responde 2xx → instancia sana. Si responde 5xx/timeout → "down".
        # Nota: los health checks activos requieren nginx-plus. Este es pasivo.

        location /nginx-health {
            # Endpoint simple para verificar que Nginx está vivo
            access_log off;
            return 200 "nginx-ok\n";
            add_header Content-Type text/plain;
        }

        # stub_status: expone estadísticas internas de Nginx.
        # El nginx-prometheus-exporter lee ESTE endpoint (no /nginx-health).
        # Solo accesible desde la red interna de Docker.
        location /stub_status {
            stub_status;
            access_log off;
            allow 172.0.0.0/8;   # Solo red interna Docker
            deny all;
        }


        # ─── Proxy al upstream ────────────────────────────────────────────────
        location / {
            # Aplicar rate limiting: burst=20 permite acumular hasta 20 requests
            # en cola cuando se supera el límite, antes de empezar a rechazar.
            # nodelay: no esperar, procesar el burst inmediatamente.
            limit_req zone=api_limit burst=20 nodelay;

            # Delegar al pool de instancias
            proxy_pass http://api_pool;

            # Si el upstream devuelve 502/503/504, reintentar con otra instancia.
            # CUIDADO: solo para requests idempotentes (GET). No para POST/PUT.
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
        }
    }
}
